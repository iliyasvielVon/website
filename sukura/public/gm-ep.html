<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>子集管理 · 沙雕库GM</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#222233;
  --accent:#fb7299;--accent2:#23ade5;--accent3:#f4a728;
  --text:#e8e8f0;--text2:#9999bb;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
a{text-decoration:none;color:inherit}
button,input{font-family:inherit}
.header{position:sticky;top:0;z-index:10;background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px}
.header h1{font-size:18px;font-weight:600;flex:1}
.header a{color:var(--accent2);font-size:13px}
.main{max-width:1100px;margin:0 auto;padding:24px}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.ep-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s}
.ep-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.ep-cover{position:relative;aspect-ratio:16/9;background:var(--bg3)}
.ep-cover img{width:100%;height:100%;object-fit:cover}
.ep-num{position:absolute;left:6px;bottom:6px;background:rgba(0,0,0,.75);color:#fff;font-size:11px;padding:2px 8px;border-radius:3px}
.ep-music-count{position:absolute;right:6px;bottom:6px;background:var(--accent);color:#fff;font-size:11px;padding:2px 8px;border-radius:3px}
.ep-info{padding:8px 10px}
.ep-title{font-size:13px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.loading{padding:60px;text-align:center;color:var(--text2)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal{background:var(--bg2);border-radius:14px;border:1px solid var(--border2);width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-hd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.modal-hd h2{font-size:16px;font-weight:600;flex:1}
.modal-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}
.modal-bd{padding:18px 22px}
.bsm{padding:5px 12px;font-size:12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer}
.bsm:hover{color:var(--text)}
.bsm.edit{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.bsm.del{background:transparent;color:#f44;border-color:rgba(244,68,68,.3)}
.bsm.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.em-row{background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:8px}
.em-grid{display:grid;grid-template-columns:80px 1fr 1fr 60px;gap:8px;margin-bottom:8px}
.em-row input{background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;width:100%}
.em-row input:focus{outline:none;border-color:var(--accent)}
.em-bottom{display:flex;gap:8px;align-items:center}
.em-bottom input{flex:1}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:13px;z-index:9999;transform:translateY(100px);opacity:0;transition:.3s;pointer-events:none}
.toast.show{transform:none;opacity:1}
.toast.error{border-color:rgba(244,68,68,.4);color:#f44}
.toast.success{border-color:rgba(76,204,76,.4);color:#4c4}
</style>
</head>
<body>

<div class="header">
  <h1 id="pageTitle">子集管理</h1>
  <a href="/gm.html">← 返回 GM 后台</a>
</div>

<div class="main">
  <div id="content"><div class="loading">加载中...</div></div>
</div>

<!-- 单集音乐编辑模态框 -->
<div class="modal-ov" id="epMusicModal">
  <div class="modal">
    <div class="modal-hd">
      <h2 id="epMusicTitle">编辑分集音乐</h2>
      <button class="modal-close" onclick="closeEpMusic()">✕</button>
    </div>
    <div class="modal-bd">
      <div id="epMusicContent"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search);
const vid = Number(params.get('vid'));
const token = localStorage.getItem('sd_token');
let currentVideo = null;
let currentEpisodes = [];
let musicCounts = {};

function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDur(s){ if(!s)return '0:00'; const m=Math.floor(s/60),sec=s%60; return m+':'+(sec<10?'0':'')+sec; }

async function api(path, opts={}){
  const headers = {'Content-Type':'application/json'};
  if (token) headers['Authorization']='Bearer '+token;
  const res = await fetch('/api'+path, {...opts, headers, body: opts.body?JSON.stringify(opts.body):undefined});
  const data = await res.json();
  if (!res.ok) throw new Error(data.error||'请求失败');
  return data;
}

async function init(){
  if (!vid) { document.getElementById('content').innerHTML='<div class="loading">缺少视频ID</div>'; return; }
  if (!token) { document.getElementById('content').innerHTML='<div class="loading">请先登录GM</div>'; return; }
  try {
    currentVideo = await api('/videos/'+vid);
    document.getElementById('pageTitle').textContent = '子集管理 · '+currentVideo.title;
    document.title = '子集管理 · '+currentVideo.title;
    
    currentEpisodes = await api('/videos/'+vid+'/episodes');
    if (!currentEpisodes.length) { document.getElementById('content').innerHTML='<div class="loading">暂无分集，请先同步B站数据</div>'; return; }
    
    // 预加载每集音乐数量
    await Promise.all(currentEpisodes.map(async ep => {
      try {
        const list = await api('/videos/'+vid+'/episodes/'+ep.ep_num+'/music');
        musicCounts[ep.ep_num] = list.length;
      } catch(e){ musicCounts[ep.ep_num] = 0; }
    }));
    
    renderEpisodes();
  } catch(e) {
    document.getElementById('content').innerHTML='<div class="loading">加载失败: '+e.message+'</div>';
  }
}

function renderEpisodes(){
  document.getElementById('content').innerHTML = `
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">共 ${currentEpisodes.length} 集，点击进入单集音乐管理</p>
    <div class="ep-grid">
      ${currentEpisodes.map(e=>`
        <div class="ep-card" onclick="openEpMusic(${e.ep_num})">
          <div class="ep-cover">
            ${e.cover?`<img src="${escH(e.cover)}" loading="lazy">`:''}
            <span class="ep-num">第${e.ep_num}集</span>
            ${musicCounts[e.ep_num]>0?`<span class="ep-music-count">🎵 ${musicCounts[e.ep_num]}</span>`:''}
          </div>
          <div class="ep-info">
            <div class="ep-title">${escH(e.title)}</div>
          </div>
        </div>`).join('')}
    </div>
  `;
}

async function openEpMusic(epNum){
  const ep = currentEpisodes.find(e => e.ep_num === epNum);
  if (!ep) return;
  document.getElementById('epMusicTitle').textContent = '第'+epNum+'集 · '+ep.title;
  document.getElementById('epMusicContent').innerHTML = '<div class="loading">加载中...</div>';
  document.getElementById('epMusicModal').classList.add('open');
  await loadMusic(epNum, ep);
}

async function loadMusic(epNum, ep){
  try {
    const list = await api('/videos/'+vid+'/episodes/'+epNum+'/music');
    musicCounts[epNum] = list.length;
    document.getElementById('epMusicContent').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px">
        <a href="https://www.bilibili.com/video/${ep.bvid}" target="_blank" style="color:var(--accent2)">▶ B站观看（${fmtDur(ep.duration)}）</a>
        <button class="bsm primary" onclick="addMusicRow(${epNum})">+ 添加音乐</button>
      </div>
      <div id="musicListBody">
        ${list.length ? list.map(m=>musicRow(m, epNum)).join('') : '<div style="text-align:center;padding:30px;color:var(--text2);font-size:13px">暂无音乐，点击右上角添加</div>'}
      </div>
    `;
    renderEpisodes();
  } catch(e){ document.getElementById('epMusicContent').innerHTML='<div class="loading">加载失败</div>'; }
}

function musicRow(m, epNum){
  return `<div class="em-row" data-id="${m.id||''}">
    <div class="em-grid">
      <input type="number" class="em-time" placeholder="秒" value="${m.timestamp||0}">
      <input type="text" class="em-title" placeholder="音乐名 *" value="${escH(m.title||'')}">
      <input type="text" class="em-artist" placeholder="作者" value="${escH(m.artist||'')}">
      <input type="number" class="em-sort" placeholder="排序" value="${m.sort||0}">
    </div>
    <div class="em-bottom">
      <input type="text" class="em-link" placeholder="原创出处链接" value="${escH(m.source_link||'')}">
      <button class="bsm edit" onclick="saveMusic(${epNum},${m.id||'null'},this)">保存</button>
      ${m.id ? `<button class="bsm del" onclick="deleteMusic(${epNum},${m.id})">删除</button>` : `<button class="bsm" onclick="this.closest('.em-row').remove()">取消</button>`}
    </div>
  </div>`;
}

function addMusicRow(epNum){
  const body = document.getElementById('musicListBody');
  if (body.querySelector('.loading') || body.children[0]?.style?.textAlign==='center') body.innerHTML = '';
  const div = document.createElement('div');
  div.innerHTML = musicRow({}, epNum);
  body.appendChild(div.firstElementChild);
}

async function saveMusic(epNum, id, btn){
  const row = btn.closest('.em-row');
  const body = {
    title: row.querySelector('.em-title').value.trim(),
    artist: row.querySelector('.em-artist').value.trim(),
    source_link: row.querySelector('.em-link').value.trim(),
    timestamp: Number(row.querySelector('.em-time').value)||0,
    sort: Number(row.querySelector('.em-sort').value)||0
  };
  if (!body.title) { showToast('请填写音乐名','error'); return; }
  try {
    if (id) await api('/videos/'+vid+'/episodes/'+epNum+'/music/'+id, {method:'PUT', body});
    else await api('/videos/'+vid+'/episodes/'+epNum+'/music', {method:'POST', body});
    showToast('保存成功');
    const ep = currentEpisodes.find(e => e.ep_num === epNum);
    await loadMusic(epNum, ep);
  } catch(e){ showToast(e.message,'error'); }
}

async function deleteMusic(epNum, id){
  if (!confirm('删除这条音乐?')) return;
  try {
    await api('/videos/'+vid+'/episodes/'+epNum+'/music/'+id, {method:'DELETE'});
    showToast('已删除');
    const ep = currentEpisodes.find(e => e.ep_num === epNum);
    await loadMusic(epNum, ep);
  } catch(e){ showToast(e.message,'error'); }
}

function closeEpMusic(){
  document.getElementById('epMusicModal').classList.remove('open');
}

init();
</script>
</body>
</html>
